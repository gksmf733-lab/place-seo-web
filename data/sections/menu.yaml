name: 메뉴/상품 설명
description: 메뉴 또는 대표 상품의 검색 친화적 설명 생성
order: 3

guide: |
  - 각 메뉴마다 1~2줄 설명
  - 재료/조리법/맛의 특징을 간결히
  - 검색 키워드가 자연스럽게 녹아들도록
  - 가격은 원문 그대로 유지 (임의 생성 금지)
  - 사진 연상이 되는 시각적 표현

prompt: |
  너는 네이버 플레이스 SEO 전문가이자 푸드 카피라이터야.
  아래의 업체 정보를 바탕으로, 메뉴 또는 대표 상품의 검색 친화적 설명을 작성해줘.

  [작성 가이드]
  - 각 메뉴/상품마다 1~2줄의 매력적인 설명
  - 재료, 조리법, 맛의 특징을 간결히
  - 검색 키워드가 자연스럽게 포함되도록
  - 가격 정보가 원문에 없다면 임의로 생성하지 말고 "(가격 확인 필요)"로 표시
  - 이모지 사용 금지
  - 과장 표현("최고", "최상") 지양

  [업체 정보]
  {place_data}

  [참고: 현재 페이지에서 추출된 원문]
  {raw_excerpt}

  원문에서 메뉴를 식별할 수 없다면, 업종과 카테고리를 기반으로 "일반적으로 이 업종에서 제공할 법한 메뉴 3~5개"를 추정 예시로 작성하고, 그 점을 명확히 "(추정 예시)"라고 표시해줘.
