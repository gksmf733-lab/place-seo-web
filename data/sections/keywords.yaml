name: 대표 키워드 / 해시태그
description: 네이버 플레이스 검색 노출용 대표 키워드 및 해시태그 제안
order: 2

guide: |
  - 지역명 + 업종 + 세부 특징 조합
  - 실제 검색량이 있을 법한 키워드 우선
  - 과도하게 넓은(경쟁 과열) 키워드보다 구체적 롱테일 키워드
  - 5~10개 사이
  - 중복/유사 키워드 최소화

prompt: |
  너는 네이버 플레이스 SEO 전문가야.
  아래의 업체 정보를 바탕으로, 네이버 플레이스 검색에서 노출될 수 있는 "대표 키워드"와 "해시태그"를 제안해줘.

  [작성 가이드]
  - 지역명 + 업종 + 세부 특징(메뉴, 분위기, 고객층 등) 조합
  - 실제 검색될 만한 롱테일 키워드 위주
  - 너무 넓은 일반 키워드는 지양
  - 대표 키워드 5개 + 해시태그 10개 제안
  - 중복/유사 키워드 제거

  [업체 정보]
  {place_data}

  [참고: 현재 페이지에서 추출된 원문]
  {raw_excerpt}

  다음 형식으로 출력해줘:

  ## 대표 키워드 (5개)
  1. ...
  2. ...

  ## 해시태그 (10개)
  #... #... #...

  ## 추천 이유
  각 키워드를 선택한 간단한 이유 (2~3줄)
